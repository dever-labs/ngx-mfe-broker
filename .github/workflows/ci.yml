name: CI / Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Run tests
        run: npm test -- --watch=false

      - name: Lint
        run: npm run lint

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/ngx-mfe-broker
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/ngx-mfe-broker

      - name: Publish to npm
        run: npm publish dist/ngx-mfe-broker --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
