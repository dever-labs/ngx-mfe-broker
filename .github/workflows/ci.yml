name: CI / Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Run tests
        run: npm test -- --watch=false

      - name: Lint
        run: npm run lint

      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/ngx-mfe-broker
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download dist
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v6
        with:
          name: dist
          path: dist/ngx-mfe-broker

      - name: Publish to npm
        working-directory: dist/ngx-mfe-broker
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXISTING=$(npm view "@dever-labs/ngx-mfe-broker@${PKG_VERSION}" version 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Version ${PKG_VERSION} is already published — skipping."
            exit 0
          fi
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
